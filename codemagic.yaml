workflows:

  # ────────────────────────────────────────────────────────────
  #  iOS / iPadOS — builds a signed .ipa ready to sideload
  #  or submit to TestFlight / App Store
  # ────────────────────────────────────────────────────────────
  ios-build:
    name: AniStream iOS
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      ios_signing:
        distribution_type: ad_hoc        # change to app_store for App Store
        bundle_identifier: com.anistream.app
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        BUNDLE_ID: com.anistream.app
        APP_NAME: AniStream
      node: 18
      xcode: latest
      cocoapods: default

    scripts:
      # 1. Install Node deps
      - name: Install dependencies
        script: npm install

      # 2. Add the iOS platform if not already committed
      - name: Add iOS platform
        script: |
          if [ ! -d "ios" ] || [ ! -f "ios/App/App.xcodeproj/project.pbxproj" ]; then
            npx cap add ios
          fi

      # 3. Copy our custom Swift files into the Xcode project
      - name: Copy content blocker & AppDelegate patch
        script: |
          cp ios/AniStreamContentBlocker.swift ios/App/App/AniStreamContentBlocker.swift

          # Apply AppDelegate patch — adds blocker call if not already present
          APPDELEGATE="ios/App/App/AppDelegate.swift"
          if ! grep -q "AniStreamContentBlocker" "$APPDELEGATE"; then
            sed -i '' 's/return true/AniStreamContentBlocker.apply(to: self.window!.rootViewController!.view.subviews.compactMap({ $0 as? WKWebView }).first!)\n        return true/' "$APPDELEGATE"
          fi

      # 4. Inject the Info.plist ATS additions
      - name: Patch Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:aniwatchtv.to dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:aniwatchtv.to:NSIncludesSubdomains bool true" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSExceptionDomains:aniwatchtv.to:NSExceptionAllowsInsecureHTTPLoads bool false" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName AniStream" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string AniStream" "$PLIST"
          # All orientations for iPad
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" "$PLIST" 2>/dev/null || true

      # 5. Install CocoaPods
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      # 6. Sync Capacitor config into native project
      - name: Capacitor sync
        script: npx cap sync ios

      # 7. Build the .ipa
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      # ── Optional: push to TestFlight automatically ──────────
      # Uncomment and fill in your Apple credentials in
      # Codemagic → App settings → Environment variables
      #
      # app_store_connect:
      #   api_key: $APP_STORE_CONNECT_PRIVATE_KEY
      #   key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
      #   issuer_id: $APP_STORE_CONNECT_ISSUER_ID
      #   submit_to_testflight: true

      email:
        recipients:
          - YOUR_EMAIL@example.com     # ← replace with your email
        notify:
          success: true
          failure: true


  # ────────────────────────────────────────────────────────────
  #  Android — builds a debug APK ready to sideload
  # ────────────────────────────────────────────────────────────
  android-build:
    name: AniStream Android
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - anistream_keystore           # name of keystore uploaded in Codemagic UI
      vars:
        PACKAGE_NAME: com.anistream.app
        APP_NAME: AniStream
      node: 18
      java: 17

    scripts:
      # 1. Install Node deps
      - name: Install dependencies
        script: npm install

      # 2. Add the Android platform if not already committed
      - name: Add Android platform
        script: |
          if [ ! -d "android/app/src/main" ]; then
            npx cap add android
          fi

      # 3. Copy our custom Java files
      - name: Copy WebViewClient & MainActivity patch
        script: |
          JAVA_DIR="android/app/src/main/java/com/anistream/app"
          mkdir -p "$JAVA_DIR"
          cp android/AniStreamWebViewClient.java "$JAVA_DIR/AniStreamWebViewClient.java"
          cp android/MainActivity-patch.java     "$JAVA_DIR/MainActivity.java"

      # 4. Apply network security config
      - name: Apply network security config
        script: |
          RES_DIR="android/app/src/main/res/xml"
          mkdir -p "$RES_DIR"
          cp android-network-security-config.xml "$RES_DIR/network_security_config.xml"

          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "networkSecurityConfig" "$MANIFEST"; then
            sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' "$MANIFEST"
          fi

      # 5. Sync Capacitor config into native project
      - name: Capacitor sync
        script: npx cap sync android

      # 6. Build release APK
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleRelease \
            -PstoreFile="$CM_KEYSTORE_PATH" \
            -PstorePassword="$CM_KEYSTORE_PASSWORD" \
            -PkeyAlias="$CM_KEY_ALIAS" \
            -PkeyPassword="$CM_KEY_PASSWORD"

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab

    publishing:
      # ── Optional: push to Google Play automatically ─────────
      # Uncomment after setting up a service account in Codemagic
      #
      # google_play:
      #   credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      #   track: internal
      #   submit_as_draft: true

      email:
        recipients:
          - YOUR_EMAIL@example.com     # ← replace with your email
        notify:
          success: true
          failure: true


  # ────────────────────────────────────────────────────────────
  #  Build BOTH platforms in parallel with one trigger
  # ────────────────────────────────────────────────────────────
  build-all:
    name: AniStream — iOS + Android
    max_build_duration: 90
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Trigger both workflows
        script: echo "Trigger ios-build and android-build from Codemagic UI"
